<svg width="100%" viewBox="0 0 680 620" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    text { font-family: sans-serif; fill: #1a1a1a; }
    .th { font-size: 14px; font-weight: 500; }
    .ts { font-size: 12px; font-weight: 400; fill: #555; }
    .arr { stroke: #888; stroke-width: 1.5; fill: none; }

    /* Purple - Claude Code */
    .c-purple rect { fill: #EEEDFE; stroke: #534AB7; }
    .c-purple .th { fill: #3C3489; }
    .c-purple .ts { fill: #534AB7; }

    /* Teal - MCP Server */
    .c-teal rect { fill: #E1F5EE; stroke: #0F6E56; }
    .c-teal .th { fill: #085041; }
    .c-teal .ts { fill: #0F6E56; }

    /* Amber - Build system */
    .c-amber rect { fill: #FAEEDA; stroke: #854F0B; }
    .c-amber .th { fill: #633806; }
    .c-amber .ts { fill: #854F0B; }

    /* Blue - Process manager */
    .c-blue rect { fill: #E6F1FB; stroke: #185FA5; }
    .c-blue .th { fill: #0C447C; }
    .c-blue .ts { fill: #185FA5; }

    /* Coral - IPC Bridge + Command Server */
    .c-coral rect { fill: #FAECE7; stroke: #993C1D; }
    .c-coral .th { fill: #712B13; }
    .c-coral .ts { fill: #993C1D; }

    /* Gray - Engine container + artifacts */
    .c-gray rect { fill: #F1EFE8; stroke: #5F5E5A; }
    .c-gray .th { fill: #444441; }
    .c-gray .ts { fill: #5F5E5A; }

    /* Green - Scene manager */
    .c-green rect { fill: #EAF3DE; stroke: #3B6D11; }
    .c-green .th { fill: #27500A; }
    .c-green .ts { fill: #3B6D11; }
  </style>
</defs>

<!-- Claude Code (top) -->
<g class="c-purple">
  <rect x="230" y="20" width="220" height="52" rx="10" stroke-width="0.5"/>
  <text class="th" x="340" y="40" text-anchor="middle" dominant-baseline="central">Claude Code agent</text>
  <text class="ts" x="340" y="58" text-anchor="middle" dominant-baseline="central">Reads code, plans, edits, calls tools</text>
</g>

<!-- Arrow down to MCP -->
<line x1="340" y1="72" x2="340" y2="108" class="arr" stroke="#7F77DD" marker-end="url(#arrow)"/>

<!-- MCP Server (middle tier) -->
<g class="c-teal">
  <rect x="60" y="108" width="560" height="56" rx="10" stroke-width="0.5"/>
  <text class="th" x="340" y="128" text-anchor="middle" dominant-baseline="central">Custom MCP server  (Node.js / Python)</text>
  <text class="ts" x="340" y="148" text-anchor="middle" dominant-baseline="central">build · run · stop · screenshot · tick · load_scene · get_state</text>
</g>

<!-- Arrows MCP → 3 subsystems -->
<line x1="160" y1="164" x2="130" y2="210" class="arr" stroke="#1D9E75" marker-end="url(#arrow)"/>
<line x1="340" y1="164" x2="340" y2="210" class="arr" stroke="#1D9E75" marker-end="url(#arrow)"/>
<line x1="520" y1="164" x2="550" y2="210" class="arr" stroke="#1D9E75" marker-end="url(#arrow)"/>

<!-- Build system box -->
<g class="c-amber">
  <rect x="40" y="210" width="180" height="68" rx="8" stroke-width="0.5"/>
  <text class="th" x="130" y="232" text-anchor="middle" dominant-baseline="central">Build system</text>
  <text class="ts" x="130" y="250" text-anchor="middle" dominant-baseline="central">cmake --build</text>
  <text class="ts" x="130" y="265" text-anchor="middle" dominant-baseline="central">compile_commands.json</text>
</g>

<!-- Process manager box -->
<g class="c-blue">
  <rect x="250" y="210" width="180" height="68" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="232" text-anchor="middle" dominant-baseline="central">Process manager</text>
  <text class="ts" x="340" y="250" text-anchor="middle" dominant-baseline="central">spawn / kill engine</text>
  <text class="ts" x="340" y="265" text-anchor="middle" dominant-baseline="central">stdout / stderr capture</text>
</g>

<!-- Engine IPC bridge box -->
<g class="c-coral">
  <rect x="460" y="210" width="180" height="68" rx="8" stroke-width="0.5"/>
  <text class="th" x="550" y="232" text-anchor="middle" dominant-baseline="central">Engine IPC bridge</text>
  <text class="ts" x="550" y="250" text-anchor="middle" dominant-baseline="central">HTTP / Unix socket</text>
  <text class="ts" x="550" y="265" text-anchor="middle" dominant-baseline="central">JSON command API</text>
</g>

<!-- Arrow down from Process Manager & IPC to engine -->
<line x1="340" y1="278" x2="340" y2="340" class="arr" stroke="#378ADD" marker-end="url(#arrow)"/>
<line x1="550" y1="278" x2="490" y2="340" class="arr" stroke="#D85A30" marker-end="url(#arrow)"/>

<!-- Running Engine box (big container) -->
<g class="c-gray">
  <rect x="100" y="340" width="480" height="130" rx="12" stroke-width="0.5"/>
  <text class="th" x="340" y="364" text-anchor="middle" dominant-baseline="central">Running engine process</text>
</g>

<!-- Vulkan renderer -->
<g class="c-blue">
  <rect x="120" y="380" width="130" height="72" rx="6" stroke-width="0.5"/>
  <text class="th" x="185" y="398" text-anchor="middle" dominant-baseline="central">Vulkan renderer</text>
  <text class="ts" x="185" y="414" text-anchor="middle" dominant-baseline="central">offscreen / headless</text>
  <text class="ts" x="185" y="428" text-anchor="middle" dominant-baseline="central">PNG screenshot export</text>
</g>

<!-- Scene manager -->
<g class="c-green">
  <rect x="275" y="380" width="130" height="72" rx="6" stroke-width="0.5"/>
  <text class="th" x="340" y="398" text-anchor="middle" dominant-baseline="central">Scene manager</text>
  <text class="ts" x="340" y="414" text-anchor="middle" dominant-baseline="central">load JSON scene</text>
  <text class="ts" x="340" y="428" text-anchor="middle" dominant-baseline="central">manual tick(dt)</text>
</g>

<!-- Command server -->
<g class="c-coral">
  <rect x="430" y="380" width="130" height="72" rx="6" stroke-width="0.5"/>
  <text class="th" x="495" y="398" text-anchor="middle" dominant-baseline="central">Command server</text>
  <text class="ts" x="495" y="414" text-anchor="middle" dominant-baseline="central">HTTP :7777</text>
  <text class="ts" x="495" y="428" text-anchor="middle" dominant-baseline="central">POST /screenshot, /tick…</text>
</g>

<!-- Feedback loop arrows -->
<path d="M100 470 Q40 470 40 520 Q40 570 160 570" fill="none" stroke="#aaa" stroke-width="1" stroke-dasharray="5 4" marker-end="url(#arrow)"/>
<path d="M580 470 Q640 470 640 520 Q640 570 520 570" fill="none" stroke="#aaa" stroke-width="1" stroke-dasharray="5 4" marker-end="url(#arrow)"/>
<text font-family="sans-serif" font-size="11" fill="#888" x="26" y="513" transform="rotate(-90,26,513)">feedback</text>

<!-- Artifacts row -->
<g class="c-gray">
  <rect x="100" y="555" width="480" height="44" rx="8" stroke-width="0.5"/>
  <text class="ts" x="340" y="577" text-anchor="middle" dominant-baseline="central">Test output artifacts:  screenshots · logs · pass/fail JSON · memory reports</text>
</g>

<!-- Agent loop arrow back up -->
<path d="M580 555 Q660 555 660 300 Q660 40 450 40" fill="none" stroke="#7F77DD" stroke-width="1.2" stroke-dasharray="5 4" marker-end="url(#arrow)"/>
<text font-family="sans-serif" font-size="11" fill="#7F77DD" x="672" y="300" text-anchor="middle" transform="rotate(-90,672,300)">agent loop</text>

</svg>
